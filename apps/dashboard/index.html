<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#d96c3d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TQ Orders" />
    <title>Agen tao don hang</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=20260624c" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Thien Quang Smarttools</p>
        <h1>Agen tao don hang</h1>
      </header>

      <main class="dashboard">
        <section class="panel">
          <div class="panel-heading" hidden>
            <h2>Thong tin khach</h2>
          </div>

          <label class="field">
            <span>So dien thoai</span>
            <input id="customerPhone" type="tel" inputmode="numeric" placeholder="09..." />
          </label>

          <div id="customerSuggestions" class="suggestion-stack" hidden></div>

          <label class="field">
            <span>Ten khach</span>
            <input id="customerName" type="text" placeholder="Ten nguoi nhan" />
          </label>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>Dia chi giao hang</h2>
          </div>

          <div class="address-grid">
            <label class="field">
              <span>Tinh / Thanh pho</span>
              <select id="provinceSelect">
                <option value="">Chon tinh / thanh pho</option>
              </select>
            </label>

            <label class="field">
              <span>Quan / Huyen</span>
              <select id="districtSelect" disabled>
                <option value="">Chon quan / huyen</option>
              </select>
            </label>

            <label class="field">
              <span>Phuong / Xa</span>
              <select id="wardSelect" disabled>
                <option value="">Chon phuong / xa</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span>Dia chi cu the</span>
            <textarea
              id="addressDetail"
              rows="3"
              placeholder="So nha, thon, ap, hem, duong..."
            ></textarea>
          </label>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>San pham</h2>
          </div>

          <label class="field">
            <span>Tim san pham</span>
            <input
              id="productSearch"
              type="search"
              inputmode="search"
              placeholder="Vi du: V30, X8-2X1T, bay cat ron..."
            />
          </label>

          <div id="productResults" class="product-results"></div>
          <div id="selectedItems" class="selected-items empty-state">
            Chua co san pham nao duoc chon.
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <h2>Don hang</h2>
          </div>

          <label class="field">
            <span>Tong gia tri don hang</span>
            <input
              id="orderTotal"
              type="text"
              inputmode="numeric"
              placeholder="350.000"
            />
          </label>

          <label class="field">
            <span>Ghi chu admin</span>
            <textarea
              id="orderNote"
              rows="3"
              placeholder="Ghi chu them neu khach dan gio giao, cong, so phu..."
            ></textarea>
          </label>

          <button id="queueRequest" class="primary-button" type="button">
            Gui AI tao don
          </button>
          <p id="formMessage" class="form-message" aria-live="polite"></p>
        </section>

        <section id="opsPanel" class="panel" hidden>
          <div class="panel-heading" hidden></div>
          <div class="inbox-config" hidden></div>
          <div class="queue-actions" hidden></div>
          <input id="inboxUrl" type="hidden" />
          <input id="inboxKey" type="hidden" />
          <button id="sendQueue" class="ghost-button" type="button" hidden>Gui inbox</button>
          <button id="copyQueue" class="ghost-button" type="button" hidden>Copy queue</button>
          <button id="downloadQueue" class="ghost-button" type="button" hidden>Tai queue JSON</button>
          <button id="clearQueue" class="ghost-button" type="button" hidden>Xoa queue</button>
          <p id="queueMessage" class="form-message" aria-live="polite" hidden></p>
          <div id="queueItems" class="selected-items empty-state">Chua co yeu cau nao trong queue.</div>
        </section>

        <section id="payloadPanel" class="panel payload-panel" hidden>
          <pre id="payloadPreview" class="payload-preview" hidden>Chua co payload.</pre>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js?v=20260624c"></script>
  </body>
</html>
